<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b21b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spiralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="600" fill="url(#bgGradient)"/>
  
  <!-- Dream layers -->
  <rect x="50" y="100" width="300" height="400" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.3" rx="10"/>
  <rect x="70" y="120" width="260" height="360" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5" rx="8"/>
  <rect x="90" y="140" width="220" height="320" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7" rx="6"/>
  
  <!-- Spiral effect -->
  <path d="M200 200 Q250 200 250 250 Q250 300 200 300 Q150 300 150 250 Q150 200 200 200" stroke="url(#spiralGradient)" stroke-width="3" fill="none"/>
  <path d="M200 220 Q230 220 230 250 Q230 280 200 280 Q170 280 170 250 Q170 220 200 220" stroke="url(#spiralGradient)" stroke-width="2" fill="none"/>
  <path d="M200 240 Q210 240 210 250 Q210 260 200 260 Q190 260 190 250 Q190 240 200 240" stroke="url(#spiralGradient)" stroke-width="1" fill="none"/>
  
  <!-- Cityscape silhouette -->
  <rect x="0" y="400" width="400" height="200" fill="#1f2937" opacity="0.8"/>
  <rect x="20" y="350" width="30" height="50" fill="#374151"/>
  <rect x="60" y="320" width="25" height="80" fill="#374151"/>
  <rect x="95" y="340" width="35" height="60" fill="#374151"/>
  <rect x="140" y="300" width="40" height="100" fill="#374151"/>
  <rect x="190" y="330" width="30" height="70" fill="#374151"/>
  <rect x="230" y="310" width="35" height="90" fill="#374151"/>
  <rect x="275" y="340" width="25" height="60" fill="#374151"/>
  <rect x="310" y="320" width="30" height="80" fill="#374151"/>
  <rect x="350" y="350" width="25" height="50" fill="#374151"/>
  
  <!-- Title -->
  <text x="200" y="480" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold">INCEPTION</text>
  
  <!-- Year -->
  <text x="200" y="520" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="18">2010</text>
</svg>
