<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="600" fill="url(#bgGradient)"/>
  
  <!-- Mountain silhouette -->
  <path d="M0 400 L100 300 L200 350 L300 250 L400 300 L400 600 L0 600 Z" fill="#064e3b" opacity="0.8"/>
  
  <!-- Ring -->
  <circle cx="200" cy="200" r="50" fill="none" stroke="url(#ringGradient)" stroke-width="8"/>
  <circle cx="200" cy="200" r="35" fill="none" stroke="url(#ringGradient)" stroke-width="4"/>
  <circle cx="200" cy="200" r="20" fill="none" stroke="url(#ringGradient)" stroke-width="2"/>
  
  <!-- Elvish script effect -->
  <path d="M50 150 Q100 120 150 150 Q200 180 250 150 Q300 120 350 150" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M50 250 Q100 220 150 250 Q200 280 250 250 Q300 220 350 250" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.6"/>
  
  <!-- Title -->
  <text x="200" y="450" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">LE SEIGNEUR DES</text>
  <text x="200" y="475" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="24" font-weight="bold">ANNEAUX</text>
  <text x="200" y="500" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="16">La Communauté de l'Anneau</text>
  
  <!-- Year -->
  <text x="200" y="540" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="18">2001</text>
</svg>
