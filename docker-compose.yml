services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: filmuser
      POSTGRES_PASSWORD: filmpass
      POSTGRES_DB: films
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filmuser -d films -h localhost"]
      interval: 2s
      timeout: 2s
      retries: 30
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - 8080:8080
    environment:
      DATABASE_URL: "postgresql://filmuser:filmpass@db:5432/films"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uv run setup_db.py && uv run uvicorn main:app --host 0.0.0.0 --port 8080"

volumes:
  db_data:
